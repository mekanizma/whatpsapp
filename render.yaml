# Render Blueprint — WhatsApp AI SaaS
# Kurulum: Render Dashboard → New → Blueprint → bu repo
# Rehber: docs/RENDER.md

services:
  - type: web
    name: whatsapp-ai-api
    runtime: node
    region: frankfurt
    plan: free
    rootDir: backend
    buildCommand: NPM_CONFIG_PRODUCTION=false npm install && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DEMO_MODE
        value: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: WHATSAPP_VERIFY_TOKEN
        generateValue: true
      - key: WHATSAPP_API_VERSION
        value: v21.0
      - key: CORS_ORIGIN
        sync: false

staticSites:
  - name: whatsapp-ai-web
    rootDir: frontend
    buildCommand: NPM_CONFIG_PRODUCTION=false npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
      - key: VITE_API_URL
        fromService:
          type: web
          name: whatsapp-ai-api
          envVarKey: RENDER_EXTERNAL_URL
