# Render Blueprint — tek web servisi (frontend + backend + WhatsApp QR)
# Dashboard: https://dashboard.render.com/blueprint/new?repo=https://github.com/mekanizma/whatpsapp

services:
  - type: web
    name: whatsapp-ai
    runtime: node
    region: frankfurt
    plan: starter
    branch: main
    buildCommand: NPM_CONFIG_PRODUCTION=false npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /health
    autoDeployTrigger: commit
    disk:
      name: whatsapp-sessions
      mountPath: /opt/render/project/src/data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSIONS_DIR
        value: /opt/render/project/src/data/sessions
      - key: DEMO_MODE
        value: "false"
      - key: VITE_DEMO_MODE
        value: "false"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o
      - key: AI_MAX_HISTORY
        value: "60"
      - key: OPENAI_EMBEDDING_MODEL
        value: text-embedding-3-small
      - key: RAG_TOP_K
        value: "10"
      - key: RAG_MATCH_THRESHOLD
        value: "0.5"
      - key: RAG_MAX_CONTEXT_CHARS
        value: "6000"
      - key: WHATSAPP_VERIFY_TOKEN
        sync: false
      - key: WHATSAPP_API_VERSION
        value: v21.0
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
